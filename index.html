<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Gunning Point Capital — Real estate investment & development in Greater Boston</title>
<meta name="description" content="Gunning Point Capital acquires value-add properties in the Greater Boston area and develops them thoughtfully — delivering returns alongside community growth.">

<!-- Open Graph (link previews in iMessage, LinkedIn, Slack, etc.) -->
<meta property="og:title" content="Gunning Point Capital">
<meta property="og:description" content="Repositioning underutilized real estate in the Greater Boston area.">
<meta property="og:image" content="/assets/og-image.png">
<meta property="og:url" content="https://gunningpointcapital.com">
<meta property="og:type" content="website">

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Gunning Point Capital">
<meta name="twitter:description" content="Repositioning underutilized real estate in the Greater Boston area.">
<meta name="twitter:image" content="/assets/og-image.png">

<!-- Favicons -->
<link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png">
<link rel="apple-touch-icon" sizes="180x180" href="/assets/favicon-180.png">

<link rel="stylesheet" href="colors_and_type.css">
<link rel="stylesheet" href="kit.css">

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="Nav.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>
<script type="text/babel" src="HomeSections.jsx"></script>
<script type="text/babel" src="Sections.jsx"></script>

<script type="text/babel">
const { useState } = React;

function App() {
  const [page, setPage] = useState('Home');
  const [submitted, setSubmitted] = useState(false);

  const nav = (p) => {
    setPage(p);
    setSubmitted(false);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  return (
    <div className="gpc-app">
      <GPC_Nav current={page} onNav={nav} />

      {page === 'Home' && (
        <>
          <GPC_Hero onCta={() => nav('About')} />
          <GPC_Pillars />
          <GPC_CurrentProject />
        </>
      )}

      {page === 'About' && (
        <>
          <section className="gpc-section">
            <div className="gpc-container">
              <div className="gpc-eyebrow">About Us</div>
              <h1 style={{ fontFamily: 'var(--font-display)', fontWeight: 500, fontSize: 56, letterSpacing: '-0.01em', lineHeight: 1.05, color: 'var(--fg-1)', margin: 0, maxWidth: 820 }}>
                We specialize in acquiring properties in the Greater Boston area and maximizing their value through thoughtful development.
              </h1>
            </div>
          </section>
          <GPC_AboutSection />
        </>
      )}

      {page === 'Contact' && (
        <GPC_ContactSection
          submitted={submitted}
          onSubmit={() => setSubmitted(true)}
        />
      )}

      <GPC_Footer />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
